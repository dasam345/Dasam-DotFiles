# source = ~/.config/hypr/myColors.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf

# Matugen colors
source = ~/.config/hypr/colors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Dasam: 1444p 165Hz — użyj 2560x1440 (najbliższy standard)
# Jeśli monitor obsługuje 2560x1444 — zmień na tę rozdzielczość
monitor = DP-2, 2560x1440@165, 0x0, 1
# Alternatywnie dla HDMI:
# monitor = HDMI-A-1, 2560x1440@165, 0x0, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = firefox


#################
### AUTOSTART ###
#################

exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = swayosd-server
exec-once = hypridle
exec-once = hyprlock     # blokada przy starcie sesji (zastępuje ekran logowania przy autologin)
# exec-once = discord    # odkomentuj jeśli chcesz discord na starcie


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Twilight-cursors

# Editor
env = EDITOR,code

# AMD GPU (RX 9060 XT) — Wayland/VA-API
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = __GLX_VENDOR_LIBRARY_NAME,mesa

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt Wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Electron/Chromium apps na Wayland
env = NIXOS_OZONE_WL,1


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.3 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
