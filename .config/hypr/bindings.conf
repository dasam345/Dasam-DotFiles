###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# ── Apps & Utils ──────────────────────────────────────────────
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, dolphin
bind = $mainMod, B, exec, firefox
bind = $mainMod, T, togglefloating,
bind = $mainMod, SPACE, exec, rofi -show drun || pkill rofi
bind = $mainMod SHIFT, SPACE, exec, ~/.config/waybar/scripts/reloadwb.sh
bind = CTRL, SPACE, exec, ~/.config/rofi/scripts/wallpaper.sh
bind = $mainMod SHIFT, E, exec, ~/.config/rofi/scripts/emoji-picker.sh
bind = $mainMod SHIFT, I, exec, ~/.config/rofi/scripts/icon-picker.sh
bind = $mainMod SHIFT, W, exec, ~/.config/rofi/scripts/wbswitcher.sh
bind = $mainMod ALT, SPACE, exec, ~/.config/rofi/scripts/menu.sh
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, X, exec, wlogout
bind = $mainMod, P, pseudo,   # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SHIFT, PRINT, exec, ~/.config/hypr/scripts/colorpick.sh
bind = $mainMod, D, exec, discord

# ── Window focus ─────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ── Workspaces ───────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scratchpad ───────────────────────────────────────────────
bind = $mainMod ALT, S, movetoworkspace, special:magic

# ── Mouse ────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Volume OSD (SwayOSD) ─────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh up
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/osd.sh mute

# ── Media ────────────────────────────────────────────────────
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ── Jasność (jeśli laptop — dla AMD GPU desktop zwykle nieaktywne) ──
# bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Screenshot ───────────────────────────────────────────────
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
